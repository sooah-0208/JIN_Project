name: test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      # - name: Check PowerShell
      #   run: $PSVersionTable

      - name: Checkout repository
        uses: actions/checkout@v4

      # - name: Check Node.js version
      #   run: node -v

      - name: npm install
        working-directory: ./frontend
        run: npm i

      - name: npm build
        working-directory: ./frontend
        run: npm run build

      - name: nginx start
        run: |
          docker rm -f web
          docker run -d -p 80:80 -v ./frontend/dist:/usr/share/nginx/html -v ./frontend/default.conf:/etc/nginx/conf.d/default.conf --name web nginx:1.28
